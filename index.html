<!DOCTYPE html>
<html>
<head>
  <title>AI Data Type Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

  <h2>🤖 AI Data Type Chatbot</h2>

  <!-- Chat Messages -->
  <div id="chat-box"></div>

  <!-- Input Area -->
  <div class="input-area">

    <!-- ✅ UPDATED DROPDOWN -->
    <div class="dropdown">
      <select id="language">
        <option value="python">🐍 Python</option>
        <option value="java">☕ Java</option>
        <option value="c">💻 C</option>
      </select>
    </div>

    <input id="userInput" type="text" placeholder="Type 123 or true or [1,2]..." />

    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="scripts.js"></script>
</body>
</html>
